<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YouTube Videos</title>
    <link rel="stylesheet" href="/styles/style.css">
    <style>
        .videos-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
        }
        .video-embed {
            flex: 1 1 320px;
            max-width: 420px;
            min-width: 320px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .video-embed iframe {
            width: 100%;
            height: 240px;
            border: none;
            border-radius: 8px;
        }
        .yt-link {
            display: block;
            text-align: center;
            margin: 2rem 0 0 0;
            font-weight: bold;
            color: #c4302b;
            text-decoration: none;
        }
        .yt-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <!-- ...existing navigation code... -->
    </nav>
    <main>
        <h1 style="text-align:center;">My YouTube Videos</h1>
        <div class="videos-container">
            <div class="video-embed">
                <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=ArchJay" allowfullscreen></iframe>
                <p>Latest uploads from my channel.</p>
            </div>
            <!-- Example: Embed a specific video (replace VIDEO_ID as needed) -->
            <!--
            <div class="video-embed">
                <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
                <p>Video title or description here.</p>
            </div>
            -->
        </div>
        <a class="yt-link" href="https://www.youtube.com/@ArchJay" target="_blank">Visit my YouTube Channel &rarr;</a>
    </main>
</body>
</html>
