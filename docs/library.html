      <h1>My Goodreads Library</h1>

      <!-- Show static HTML/CSS as a placeholder in case js is not enabled - javascript include will override this if things work -->
      <style type="text/css" media="screen">
  .gr_custom_container_ {
    /* customize your Goodreads widget container here*/
    border: 1px solid gray;
    border-radius:10px;
    padding: 10px 5px 10px 5px;
    background-color: #FFF;
    color: #000;
    width: 300px
  }
  .gr_custom_header_ {
    /* customize your Goodreads header here*/
    border-bottom: 1px solid gray;
    width: 100%;
    margin-bottom: 5px;
    text-align: center;
    font-size: 120%
  }
  .gr_custom_each_container_ {
    /* customize each individual book container here */
    width: 100%;
    clear: both;
    margin-bottom: 10px;
    overflow: auto;
    padding-bottom: 4px;
    border-bottom: 1px solid #aaa;
  }
  .gr_custom_book_container_ {
    /* customize your book covers here */
    float: left;
    width: 60px;
    height: 90px;
    margin-right: 10px;
    border: 0;
  }
  .gr_custom_author_ {
    /* customize your author names here */
    font-size: 90%;
    color: #555;
  }
  .gr_custom_title_ {
    /* customize your book titles here */
    font-weight: bold;
    font-size: 100%;
    color: #333;
  }
      </style>
      <div class="gr_custom_container_">
        <div class="gr_custom_header_">Goodreads Library</div>
        <div class="gr_custom_each_container_">
          <div class="gr_custom_book_container_">
            <img src="https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1320399351l/5470.jpg" alt="1984 by George Orwell" style="width:60px;height:90px;">
          </div>
          <div class="gr_custom_title_">1984</div>
          <div class="gr_custom_author_">by George Orwell</div>
        </div>
        <div class="gr_custom_each_container_">
          <div class="gr_custom_book_container_">
            <img src="https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1553383690l/40961427.jpg" alt="The Silent Patient by Alex Michaelides" style="width:60px;height:90px;">
          </div>
          <div class="gr_custom_title_">The Silent Patient</div>
          <div class="gr_custom_author_">by Alex Michaelides</div>
        </div>
        <!-- Add more books as needed -->
      </div>
    </section>
