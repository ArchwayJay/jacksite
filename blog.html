<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog — Jack Johnson</title>
  <meta property="og:title" content="Blog — Jack Johnson" />
  <link rel="alternate" type="application/rss+xml" title="RSS" href="feed.xml">
  <link rel="icon" href="images/jack-linkedin.png">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
  <a class="brand" href="index.html">
        <img src="images/jack-linkedin.png" alt="Jack Johnson" class="nav-avatar">
        Jack Johnson
      </a>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav" id="siteNav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="blog" aria-current="page">Blog</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page container">
    <section class="card">
      <h1>Blog</h1>
      <p class="lead">Thoughts, updates, and project notes.</p>
      <div id="posts">Articles coming</div>
    </section>
  </main>

  <script>
  function formatDate(s){
    if(!s) return '';
    const d = new Date(s);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
  }

  async function load(){
    const res = await fetch('/api/posts');
    const posts = await res.json();
    const el = document.getElementById('posts');
    if(!posts.length) el.innerHTML = '<p>No posts yet.</p>';
    else el.innerHTML = posts.map(p => `
      <article class="card" id="post-${p.id}" style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h2 style="margin:0">${p.title}</h2>
          <time style="color:var(--muted);font-size:.95rem">${formatDate(p.created_at)}</time>
        </div>
        ${p.header_image ? `<img src="${p.header_image}" alt="" style="max-width:100%;height:auto;margin-top:.5rem;border-radius:6px">` : ''}
        <div style="margin-top:.5rem;color:var(--muted)">${p.html}</div>
      </article>
    `).join('');
  }
  load();
  </script>
  <footer class="site-footer">
    <div class="container">
  <p>© 2026 Jack Johnson — <a href="index.html">Home</a> · <a href="projects.html">Projects</a> · <a href="admin.html">Admin</a></p>
    </div>
  </footer>
</body>
</html>
